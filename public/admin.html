<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — The Wall</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css" />
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-box">
    <h1>Admin access</h1>
    <p>Enter the admin key to moderate the wall.</p>
    <input type="password" id="admin-key-input" placeholder="Admin key" />
    <button id="login-btn">Enter</button>
    <p class="login-error" id="login-error" hidden></p>
  </div>
</div>

<div class="admin-panel" id="admin-panel" hidden>
  <header>
    <h1>Moderate the Wall</h1>
    <p id="count-label"></p>
  </header>
  <div class="list" id="admin-list"></div>
</div>

<script src="admin.js"></script>
</body>
</html>
