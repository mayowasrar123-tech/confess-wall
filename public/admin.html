<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — The Wall</title>
<meta name="robots" content="noindex, nofollow" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tailwind.css" />
</head>
<body class="desk-body">

<div class="desk-login-screen" id="login-screen">
  <form class="desk-login-box" id="login-form" novalidate>
    <h1>Admin access</h1>
    <p>Enter the admin key to moderate the wall.</p>
    <input type="password" id="admin-key-input" class="desk-input" placeholder="Admin key" autocomplete="current-password" aria-label="Admin key" />
    <button id="login-btn" class="desk-btn-primary" type="submit">
      <span class="btn-label">Enter</span>
    </button>
    <p class="desk-login-error" id="login-error" role="alert" hidden></p>
  </form>
</div>

<div class="desk-panel" id="admin-panel" hidden>
  <header class="desk-panel-header">
    <div>
      <h1>Moderate the Wall</h1>
      <p class="desk-count-label" id="count-label"></p>
    </div>
    <button class="desk-logout-btn" id="logout-btn" type="button">Log out</button>
  </header>

  <div class="desk-stats-bar" id="stats-bar" hidden></div>

  <div class="desk-toolbar">
    <div class="desk-search-wrap">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input type="search" id="admin-search-input" class="desk-search-input" placeholder="Search confessions or comments..." aria-label="Search" />
    </div>
    <select id="admin-category-filter" class="desk-select" aria-label="Filter by category">
      <option value="all">All categories</option>
      <option value="funny">😂 Funny</option>
      <option value="serious">💭 Serious</option>
      <option value="advice">🆘 Advice</option>
      <option value="rant">🔥 Rant</option>
      <option value="random">🎲 Random</option>
    </select>
    <select id="admin-sort-select" class="desk-select" aria-label="Sort by">
      <option value="new">Newest first</option>
      <option value="reactions">Most reactions</option>
      <option value="comments">Most comments</option>
    </select>
  </div>

  <div class="desk-list" id="admin-list" aria-live="polite">
    <div class="desk-skeleton-card" aria-hidden="true"></div>
    <div class="desk-skeleton-card" aria-hidden="true"></div>
    <div class="desk-skeleton-card" aria-hidden="true"></div>
  </div>
</div>

<div id="modal-root"></div>
<div class="toast-region" id="toast-region" aria-live="assertive"></div>

<script type="module" src="js/admin.js"></script>
</body>
</html>
